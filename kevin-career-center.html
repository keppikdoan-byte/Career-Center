<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin's Career Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0c10; color: #e8eaf0; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #12151c; }
  ::-webkit-scrollbar-thumb { background: #252a38; border-radius: 2px; }
  input[type=date] { color-scheme: dark; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div id="root">
  <div id="loading-msg" style="padding:40px;font-family:sans-serif;color:#e8eaf0;background:#0a0c10;min-height:100vh;">
    <h2 style="color:#00e5a0;">Loading Career Command Center...</h2>
    <p style="color:#5a6070;margin-top:10px;">If this message stays on screen for more than 10 seconds, the React libraries failed to load.</p>
    <p style="color:#5a6070;margin-top:6px;">This usually means: (1) no internet connection, or (2) the file was opened directly instead of via localhost.</p>
    <p id="error-detail" style="color:#ff6b4a;margin-top:14px;font-family:monospace;font-size:13px;"></p>
  </div>
</div>

<script>
  window.addEventListener("error", function(e) {
    var el = document.getElementById("error-detail");
    if (el) el.textContent = "ERROR: " + e.message + (e.filename ? " (in " + e.filename + ")" : "");
  });
  setTimeout(function() {
    if (typeof React === "undefined") {
      var el = document.getElementById("error-detail");
      if (el) el.textContent = "ERROR: React library did not load. Check your internet connection, and make sure you opened this via http://localhost:8000 (not by double-clicking the file).";
    }
  }, 3000);
</script>

<script type="text/babel">
const { useState } = React;

// ── WORKER URL ────────────────────────────────────────────────────────────
const WORKER = "https://kevin-career-worker.keppikdoan.workers.dev";

// ── ROLES (weighted: SDR/BDR ~50%, Customer Success ~25%, Other ~25%) ──────
const SDR_ROLES = [
  { label: "SDR / BDR",         query: "sales development representative" },
  { label: "Business Dev Rep",  query: "business development representative" },
  { label: "Inside Sales",      query: "inside sales representative" },
];

const CS_ROLES = [
  { label: "Customer Success Mgr",   query: "customer success manager SaaS" },
  { label: "Client Success",         query: "client success manager software" },
  { label: "CS Associate",           query: "customer success associate SaaS" },
  { label: "CS Specialist",          query: "customer success specialist software" },
  { label: "CS Intern",              query: "customer success intern SaaS" },
  { label: "CS Implementation",      query: "customer success implementation software" },
  { label: "CS Onboarding",          query: "customer success onboarding SaaS" },
];

const OTHER_ROLES = [
  { label: "Account Manager",   query: "account manager" },
  { label: "Account Executive", query: "account executive" },
  { label: "Operations Coord.", query: "operations coordinator" },
  { label: "Operations Mgr",    query: "operations manager" },
  { label: "Logistics Ops",     query: "logistics coordinator" },
  { label: "Supply Chain",      query: "supply chain coordinator" },
  { label: "Implementation",    query: "implementation specialist" },
  { label: "Revenue Ops",       query: "revenue operations" },
  { label: "Program Coord.",    query: "program coordinator" },
  { label: "Customer Onboard.", query: "onboarding specialist" },
  { label: "Biz Ops",           query: "business operations" },
  { label: "Fleet Coord.",      query: "fleet coordinator" },
];

const ALL_ROLES = [...SDR_ROLES, ...CS_ROLES, ...OTHER_ROLES];

const STAGES = [
  { key: "not_applied",  label: "Not Applied",  color: "#5a6070", bg: "rgba(90,96,112,0.12)"   },
  { key: "applied",      label: "Applied",       color: "#3d8bff", bg: "rgba(61,139,255,0.12)"  },
  { key: "phone",        label: "Phone Screen",  color: "#a78bfa", bg: "rgba(167,139,250,0.12)" },
  { key: "interview1",   label: "1st Interview", color: "#f59e0b", bg: "rgba(245,158,11,0.12)"  },
  { key: "interview2",   label: "2nd Interview", color: "#f97316", bg: "rgba(249,115,22,0.12)"  },
  { key: "final",        label: "Final Round",   color: "#ec4899", bg: "rgba(236,72,153,0.12)"  },
  { key: "offer",        label: "Offer",         color: "#00e5a0", bg: "rgba(0,229,160,0.12)"   },
  { key: "rejected",     label: "Rejected",      color: "#ff6b4a", bg: "rgba(255,107,74,0.12)"  },
  { key: "withdrew",     label: "Withdrew",      color: "#5a6070", bg: "rgba(90,96,112,0.12)"   },

const tierColor = t => t === 1 ? "#00e5a0" : t === 2 ? "#3d8bff" : "#ff6b4a";
const tierLabel = t => t === 1 ? "TIER 1 - PRIME TARGET" : t === 2 ? "TIER 2 - STRETCH" : "TIER 3 - VOLUME PLAY";
const stageByKey = k => STAGES.find(s => s.key === k) || STAGES[0];

const S = {
  root:      { fontFamily: "'DM Sans',sans-serif", background: "#0a0c10", minHeight: "100vh", color: "#e8eaf0" },
  header:    { padding: "14px 22px", borderBottom: "1px solid #252a38", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0a0c10", position: "sticky", top: 0, zIndex: 100 },
  logo:      { fontWeight: 800, fontSize: "1rem", display: "flex", alignItems: "center", gap: 8, fontFamily: "'Syne',sans-serif" },
  logoDot:   { width: 8, height: 8, background: "#00e5a0", borderRadius: "50%", boxShadow: "0 0 10px #00e5a0", animation: "pulse 2s infinite" },
  layout:    { display: "grid", gridTemplateColumns: "240px 1fr", minHeight: "calc(100vh - 53px)" },
  sidebar:   { borderRight: "1px solid #252a38", padding: 14, display: "flex", flexDirection: "column", gap: 14, overflowY: "auto" },
  content:   { padding: 20, display: "flex", flexDirection: "column", gap: 14 },
  panel:     { background: "#12151c", border: "1px solid #252a38", borderRadius: 11 },
  panelHdr:  { padding: "13px 17px", borderBottom: "1px solid #252a38" },
  panelBody: { padding: 17 },
  tabs:      { display: "flex", gap: 3, background: "#12151c", border: "1px solid #252a38", borderRadius: 9, padding: 3, width: "fit-content", flexWrap: "wrap" },
  btn:       { background: "#00e5a0", color: "#0a0c10", border: "none", padding: "9px 18px", borderRadius: 7, fontWeight: 700, fontSize: "0.8rem", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", fontFamily: "'Syne',sans-serif" },
  btn2:      { background: "transparent", border: "1px solid #252a38", color: "#e8eaf0", padding: "7px 13px", borderRadius: 7, fontSize: "0.78rem", cursor: "pointer", fontFamily: "inherit" },
  btnSm:     { background: "transparent", border: "1px solid rgba(0,229,160,0.4)", color: "#00e5a0", padding: "3px 9px", borderRadius: 5, fontWeight: 700, fontSize: "0.65rem", cursor: "pointer", fontFamily: "inherit" },
  btnRed:    { background: "rgba(255,107,74,0.1)", border: "1px solid rgba(255,107,74,0.4)", color: "#ff6b4a", padding: "6px 14px", borderRadius: 7, fontWeight: 600, fontSize: "0.72rem", cursor: "pointer", fontFamily: "inherit" },
  select:    { background: "#0a0c10", border: "1px solid #252a38", color: "#e8eaf0", padding: "8px 11px", borderRadius: 7, fontFamily: "inherit", fontSize: "0.78rem", outline: "none" },
  input:     { background: "#0a0c10", border: "1px solid #252a38", color: "#e8eaf0", padding: "8px 11px", borderRadius: 7, fontFamily: "inherit", fontSize: "0.78rem", width: "100%", outline: "none" },
  textarea:  { background: "#0a0c10", border: "1px solid #252a38", color: "#e8eaf0", padding: 12, borderRadius: 7, fontFamily: "inherit", fontSize: "0.82rem", width: "100%", minHeight: 130, resize: "vertical", outline: "none", lineHeight: 1.6 },
  label:     { fontSize: "0.6rem", color: "#5a6070", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 5, display: "block" },
  statCard:  { background: "#12151c", border: "1px solid #252a38", borderRadius: 7, padding: 10, textAlign: "center" },
  tag:       { background: "#1a1e28", border: "1px solid #252a38", color: "#5a6070", fontSize: "0.6rem", fontFamily: "'DM Mono',monospace", padding: "2px 7px", borderRadius: 3, textTransform: "uppercase" },
  hiTag:     { background: "rgba(0,229,160,0.1)", border: "1px solid rgba(0,229,160,0.35)", color: "#00e5a0", fontSize: "0.6rem", fontFamily: "'DM Mono',monospace", padding: "2px 7px", borderRadius: 3, textTransform: "uppercase" },
};

function Spinner() {
  return <div style={{ width: 22, height: 22, border: "2px solid #252a38", borderTopColor: "#00e5a0", borderRadius: "50%", animation: "spin 0.8s linear infinite", flexShrink: 0 }} />;
}

function Toast({ msg }) {
  if (!msg) return null;
  return <div style={{ position: "fixed", bottom: 20, right: 20, background: "#1a1e28", border: "1px solid #00e5a0", color: "#e8eaf0", padding: "10px 16px", borderRadius: 8, fontSize: "0.78rem", zIndex: 1000 }}>{msg}</div>;
}

function TierBadge({ tier, small }) {
  const c = { 1: { bg: "rgba(0,229,160,0.15)", col: "#00e5a0", bdr: "rgba(0,229,160,0.3)" }, 2: { bg: "rgba(61,139,255,0.15)", col: "#3d8bff", bdr: "rgba(61,139,255,0.3)" }, 3: { bg: "rgba(255,107,74,0.15)", col: "#ff6b4a", bdr: "rgba(255,107,74,0.3)" } }[tier];
  return <span style={{ background: c.bg, color: c.col, border: `1px solid ${c.bdr}`, padding: small ? "2px 8px" : "4px 11px", borderRadius: 16, fontWeight: 700, fontSize: small ? "0.62rem" : "0.7rem", fontFamily: "'Syne',sans-serif" }}>{tierLabel(tier)}</span>;
}

function ResultCard({ result, raw, onSave, saved }) {
  const col = tierColor(result.tier);
  const url = (raw.match(/Job URL:\s*(https?:\/\/\S+)/i) || [])[1];
  return (
    <div style={{ ...S.panel, marginTop: 14 }}>
      <div style={{ padding: "15px 18px", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: "1rem" }}>{result.jobTitle}</div>
          <div style={{ fontSize: "0.74rem", color: "#5a6070", marginTop: 2 }}>{result.company}</div>
        </div>
        <TierBadge tier={result.tier} />
      </div>
      <div style={{ padding: "0 18px 18px", display: "flex", flexDirection: "column", gap: 13 }}>
        <div>
          <div style={S.label}>Match Score</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ flex: 1, height: 5, background: "#1a1e28", borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${result.matchScore}%`, background: col, borderRadius: 3 }} />
            </div>
            <span style={{ fontWeight: 700, color: col, fontSize: "0.88rem", width: 36, textAlign: "right" }}>{result.matchScore}%</span>
          </div>
          <div style={{ fontSize: "0.72rem", color: "#5a6070", marginTop: 5 }}>{result.tierReason}</div>
        </div>
        <div>
          <div style={S.label}>Score Breakdown</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            {[["Salary Fit", result.salaryFit], ["Experience", result.experienceMatch], ["Role Alignment", result.roleAlignment], ["Growth", result.growthPotential]].map(([l, v]) => (
              <div key={l} style={{ background: "#0a0c10", border: "1px solid #252a38", borderRadius: 6, padding: "7px 10px" }}>
                <div style={{ fontSize: "0.6rem", color: "#5a6070", marginBottom: 2 }}>{l}</div>
                <div style={{ fontWeight: 700, fontSize: "0.78rem" }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={S.label}>Your Strengths</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
            {(result.strengths || []).map((s, i) => <span key={i} style={{ background: "rgba(0,229,160,0.1)", border: "1px solid rgba(0,229,160,0.25)", color: "#00e5a0", fontSize: "0.65rem", fontFamily: "'DM Mono',monospace", padding: "2px 8px", borderRadius: 3 }}>{s}</span>)}
          </div>
        </div>
        {result.gaps && result.gaps.length > 0 && (
          <div>
            <div style={S.label}>Gaps to Address</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {result.gaps.map((g, i) => <span key={i} style={{ background: "rgba(255,107,74,0.1)", border: "1px solid rgba(255,107,74,0.25)", color: "#ff6b4a", fontSize: "0.65rem", fontFamily: "'DM Mono',monospace", padding: "2px 8px", borderRadius: 3 }}>{g}</span>)}
            </div>
          </div>
        )}
        <div>
          <div style={S.label}>Action Plan</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {(result.actions || []).map((a, i) => (

        </div>
        {result.mentorNote && (

            <span>🧠</span><span><strong>Mentor Note:</strong> {result.mentorNote}</span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", gap: 8, padding: "12px 18px", borderTop: "1px solid #252a38", flexWrap: "wrap", alignItems: "center" }}>
        <button style={{ ...S.btn, opacity: saved ? 0.5 : 1 }} disabled={saved} onClick={onSave}>{saved ? "✓ Saved" : "+ Save to Dashboard"}</button>
        {url && <a href={url} target="_blank" rel="noreferrer" style={{ color: "#3d8bff", fontSize: "0.76rem", fontFamily: "'DM Mono',monospace", textDecoration: "none", border: "1px solid rgba(61,139,255,0.3)", padding: "6px 13px", borderRadius: 7, background: "rgba(61,139,255,0.08)" }}>View Original Listing</a>}
      </div>
    </div>

}

function TrackerModal({ job, onSave, onClose }) {
  const [stage, setStage]       = useState((job.appStatus && job.appStatus.stage) || "not_applied");
  const [dateApplied, setDate]  = useState((job.appStatus && job.appStatus.dateApplied) || "");
  const [contact, setContact]   = useState((job.appStatus && job.appStatus.contact) || "");
  const [cRole, setCRole]       = useState((job.appStatus && job.appStatus.contactRole) || "");
  const [response, setResp]     = useState((job.appStatus && job.appStatus.companyResponse) || "");
  const [nextAction, setNext]   = useState((job.appStatus && job.appStatus.nextAction) || "");
  const [nextDate, setNextDate] = useState((job.appStatus && job.appStatus.nextActionDate) || "");
  const [notes, setNotes]       = useState((job.appStatus && job.appStatus.notes) || "");
  const st = stageByKey(stage);

  function handleSave() {
    const auto = !(job.appStatus && job.appStatus.dateApplied) && stage !== "not_applied" ? new Date().toISOString().split("T")[0] : dateApplied;
    onSave({ stage, dateApplied: auto, contact, contactRole: cRole, companyResponse: response, nextAction, nextActionDate: nextDate, notes, lastUpdated: new Date().toISOString() });
  }

  const fields = [
    { lbl: "Stage", el: <select value={stage} onChange={e => setStage(e.target.value)} style={{ ...S.select, width: "100%", marginBottom: 10, borderColor: st.color, color: st.color }}>{STAGES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}</select> },
    { lbl: "Date Applied", el: <input type="date" value={dateApplied} onChange={e => setDate(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
    { lbl: "Contact Name", el: <input type="text" placeholder="e.g. Jane Smith" value={contact} onChange={e => setContact(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
    { lbl: "Contact Role", el: <input type="text" placeholder="e.g. Recruiter" value={cRole} onChange={e => setCRole(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
    { lbl: "Company Response", el: <input type="text" placeholder="e.g. Moving to phone screen" value={response} onChange={e => setResp(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
    { lbl: "Next Action", el: <input type="text" placeholder="e.g. Send thank you email" value={nextAction} onChange={e => setNext(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
    { lbl: "Next Action Due", el: <input type="date" value={nextDate} onChange={e => setNextDate(e.target.value)} style={{ ...S.input, marginBottom: 10 }} /> },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", backdropFilter: "blur(4px)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#12151c", border: "1px solid #252a38", borderRadius: 13, width: "100%", maxWidth: 540, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid #252a38", display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontWeight: 700 }}>{job.jobTitle}</div>
            <div style={{ fontSize: "0.72rem", color: "#5a6070", marginTop: 2 }}>{job.company} <TierBadge tier={job.tier} small /></div>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: "#5a6070", cursor: "pointer", fontSize: "1.2rem" }}>×</button>
        </div>
        <div style={{ padding: "18px 20px", display: "flex", flexDirection: "column", gap: 3 }}>
          {fields.map(({ lbl, el }) => <div key={lbl}><label style={S.label}>{lbl}</label>{el}</div>)}
          <div><label style={S.label}>Notes</label><textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Free notes..." style={{ ...S.textarea, minHeight: 80, marginBottom: 10 }} /></div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            <button style={S.btn2} onClick={onClose}>Cancel</button>
            <button style={S.btn} onClick={handleSave}>Save Progress</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  // Detect mentor view mode from URL
  const isMentor = window.location.search.includes("mentor=true");

  const [tab, setTab] = useState(isMentor ? "saved" : "search");
  const [toast, setToast] = useState("");
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 3000); };

  // localStorage helpers (kept as local cache)
  const loadLocal = key => { try { return JSON.parse(localStorage.getItem(key) || "[]"); } catch { return []; } };
  const saveLocal = (key, val) => localStorage.setItem(key, JSON.stringify(val));

  const [savedJobs, setSavedJobs]     = useState(() => loadLocal("kd_jobs"));
  const [trackerJobs, setTrackerJobs] = useState(() => loadLocal("kd_tracker"));
  const [modalJob, setModalJob]       = useState(null);
  const [syncing, setSyncing]         = useState(false);
  const [syncStatus, setSyncStatus]   = useState("");
  const [migrated, setMigrated]       = useState(() => !!localStorage.getItem("kd_migrated"));

  // Supabase sync — saves to both localStorage and Supabase
  async function syncToSupabase(table, jobs) {
    try {
      await fetch(WORKER + "?action=save-data", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ table, jobs })
      });
    } catch (e) {
      console.error("Supabase sync failed:", e.message);
    }
  }

  // Load from Supabase on startup (replaces localStorage with live data)
  React.useEffect(() => {
    async function loadFromSupabase() {
      setSyncing(true);
      try {
        const res = await fetch(WORKER + "?action=get-data");
        const d = await res.json();
        if (d.error) throw new Error(d.error);
        if (d.savedJobs && d.savedJobs.length > 0) {
          setSavedJobs(d.savedJobs);
          saveLocal("kd_jobs", d.savedJobs);
        }
        if (d.trackerJobs && d.trackerJobs.length > 0) {
          setTrackerJobs(d.trackerJobs);
          saveLocal("kd_tracker", d.trackerJobs);
        }
        setSyncStatus("Synced");
      } catch (e) {
        setSyncStatus("Offline — using local data");
        console.error("Load from Supabase failed:", e.message);
      }
      setSyncing(false);
    }
    loadFromSupabase();
  }, []);

  // One-time migration from localStorage to Supabase
  async function migrateToSupabase() {
    const localSaved   = loadLocal("kd_jobs");
    const localTracker = loadLocal("kd_tracker");
    if (!localSaved.length && !localTracker.length) {
      showToast("No local data found to migrate.");
      return;
    }
    setSyncing(true);
    try {
      const res = await fetch(WORKER + "?action=migrate-data", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ savedJobs: localSaved, trackerJobs: localTracker })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      showToast("Migrated " + (d.migrated.savedJobs || 0) + " saved jobs and " + (d.migrated.trackerJobs || 0) + " tracker entries to Supabase!");
      localStorage.setItem("kd_migrated", "true");
      setMigrated(true);
    } catch (e) {
      showToast("Migration failed: " + e.message);
    }
    setSyncing(false);
  }

  // Wrapped setters that also sync to Supabase
  function updateSavedJobs(jobs) {
    setSavedJobs(jobs);
    saveLocal("kd_jobs", jobs);
    syncToSupabase("saved_jobs", jobs);
  }

  function updateTrackerJobs(jobs) {
    setTrackerJobs(jobs);
    saveLocal("kd_tracker", jobs);
    syncToSupabase("tracker_jobs", jobs);
  }

  const [jobFilter, setJobFilter]     = useState("all");
  const [savedFilter, setSavedFilter] = useState("new");
  const [sortDate, setSortDate]       = useState("newest");
  const [sortTier, setSortTier]       = useState("none");
  const [trackerStage, setTrackerStage] = useState("all");

  const [salary, setSalary]           = useState("");
  const [days, setDays]               = useState("7");
  const [includeRemote, setRemote]    = useState(true);
  const [searching, setSearching]     = useState(false);
  const [searchResults, setSearchResults] = useState([]);
  const [searchError, setSearchError] = useState("");
  const [activeRoles, setActiveRoles] = useState(new Set());
  const [salaryFilter, setSalaryFilter] = useState("any");
  const [hideViewed, setHideViewed]   = useState(false);
  const [viewedIds]                   = useState(() => new Set(loadLocal("kd_viewed")));

  const [jobText, setJobText]         = useState("");
  const [jobUrl, setJobUrl]           = useState("");
  const [fetchingUrl, setFetchingUrl] = useState(false);
  const [analyzing, setAnalyzing]     = useState(false);
  const [result, setResult]           = useState(null);
  const [resultSaved, setResultSaved] = useState(false);
  const [analyzeError, setAnalyzeError] = useState("");

  const counts = { t1: savedJobs.filter(j => j.tier === 1).length, t2: savedJobs.filter(j => j.tier === 2).length, t3: savedJobs.filter(j => j.tier === 3).length };

  async function runSearch() {
    setSearching(true); setSearchError(""); setSearchResults([]);

    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function fetchRole(r, remote, count) {
      const q = remote ? r.query + " remote" : r.query;
      const url = `${WORKER}?action=search&query=${encodeURIComponent(q)}&days=${days}${salary ? "&salary=" + salary : ""}&remote=${remote}&count=${count}`;
      try {
        const res = await fetch(url);
        const d = await res.json();
        return (d.results || []).map(j => ({ ...j, _roleLabel: r.label, _remote: remote }));
      } catch { return []; }
    }

    async function fetchGroup(roles, remote, count, batchSize, batchDelay) {
      const all = [];
      for (let i = 0; i < roles.length; i += batchSize) {
        const batch = roles.slice(i, i + batchSize);
        const results = await Promise.all(batch.map(r => fetchRole(r, remote, count)));
        all.push(...results.flat());
        if (i + batchSize < roles.length) await delay(batchDelay);
      }
      return all;
    }

    try {
      // SDR/BDR roles: ~50% weight — 50 results × 3 roles = 150 per location
      const sfSDR     = await fetchGroup(SDR_ROLES, false, 50, 3, 500);
      const remoteSDR = includeRemote ? await fetchGroup(SDR_ROLES, true, 50, 3, 500) : [];

      // Customer Success roles: ~25% weight — 11 results × 7 roles = 77 per location
      const sfCS     = await fetchGroup(CS_ROLES, false, 11, 4, 500);
      const remoteCS = includeRemote ? await fetchGroup(CS_ROLES, true, 11, 4, 500) : [];

      // Other roles: ~25% weight — 6 results × 12 roles = 72 per location
      const sfOther     = await fetchGroup(OTHER_ROLES, false, 6, 4, 400);
      const remoteOther = includeRemote ? await fetchGroup(OTHER_ROLES, true, 6, 4, 400) : [];

      const seen = new Set();
      const combined = [...sfSDR, ...remoteSDR, ...sfCS, ...remoteCS, ...sfOther, ...remoteOther]
        .filter(j => { if (seen.has(j.id)) return false; seen.add(j.id); return true; })
        .sort((a, b) => new Date(b.created) - new Date(a.created));

      setSearchResults(combined);
      if (!combined.length) setSearchError("No listings found. Verify your worker is running at " + WORKER + "/?action=ping");
    } catch (e) {
      setSearchError("Search failed: " + e.message);
    }
    setSearching(false);
  }

  function markViewed(id) { viewedIds.add(String(id)); save("kd_viewed", [...viewedIds]); }

  function salaryPass(j) {
    const hasMin = j.salary_min > 0, hasMax = j.salary_max > 0;
    if (!hasMin && !hasMax) return salaryFilter !== "hide-unlisted";
    if (salaryFilter === "any") return true;
    return (!hasMin || j.salary_min <= 110000) && (!hasMax || j.salary_max >= 50000);
  }

  const filteredResults = searchResults.filter(j => {
    const roleOk   = activeRoles.size === 0 || activeRoles.has(j._roleLabel);
    const salOk    = salaryPass(j);
    const viewedOk = !hideViewed || !viewedIds.has(String(j.id));
    return roleOk && salOk && viewedOk;
  });

  function toggleRole(label) {
    const next = new Set(activeRoles);
    if (label === "__all__") next.clear();
    else if (next.has(label)) next.delete(label);
    else next.add(label);
    setActiveRoles(next);
  }

  async function fetchJobUrl() {
    if (!jobUrl.trim()) { showToast("Please enter a job URL"); return; }
    setFetchingUrl(true); setAnalyzeError("");
    try {
      const res = await fetch(`${WORKER}?action=fetch&url=${encodeURIComponent(jobUrl)}`);
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      setJobText(`Job URL: ${jobUrl}\n\nJob Description:\n${d.text}`);
      showToast("Job description loaded. Click Analyze.");
    } catch (e) {
      setAnalyzeError("Could not fetch URL: " + e.message);
    }
    setFetchingUrl(false);
  }

  async function doAnalyze(text) {
    if (!text || !text.trim()) { showToast("Paste a job description or fetch a URL first"); return; }
    setAnalyzing(true); setResult(null); setResultSaved(false); setAnalyzeError("");
    try {
      const res = await fetch(`${WORKER}?action=analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      setResult(d);
    } catch (e) { setAnalyzeError(e.message); }
    setAnalyzing(false);
  }

  function extractUrl(text) {
    const m = text.match(/Job URL:\s*(https?:\/\/\S+)/i);
    return m ? m[1] : (text.match(/https?:\/\/[^\s"')]+/) || [])[0] || null;
  }

  function saveResult() {
    if (!result) return;
    const job = { ...result, savedAt: new Date().toISOString(), rawText: jobText, listingUrl: extractUrl(jobText), appStatus: null };
    const updated = [job, ...savedJobs];
    updateSavedJobs(updated);
    setResultSaved(true); showToast("Saved to dashboard!");
  }

  function removeSavedJob(job) {
    const updated = savedJobs.filter(s => !(s.savedAt === job.savedAt && s.jobTitle === job.jobTitle && s.company === job.company));
    updateSavedJobs(updated); showToast("Job removed.");
  }

  const filteredJobs = (() => {
    let jobs = jobFilter === "all" ? [...savedJobs] : savedJobs.filter(j => j.tier === jobFilter);
    if (savedFilter === "new") { const inT = new Set(trackerJobs.map(t => t.savedAt)); jobs = jobs.filter(j => !inT.has(j.savedAt)); }
    if (sortTier !== "none") jobs.sort((a, b) => sortTier === "asc" ? a.tier - b.tier : b.tier - a.tier);
    else jobs.sort((a, b) => { const d = new Date(b.savedAt) - new Date(a.savedAt); return sortDate === "newest" ? d : -d; });
    return jobs;
  })();

  function moveToTracker(job) {
    if (trackerJobs.find(t => t.savedAt === job.savedAt)) { showToast("Already in Tracker"); return; }
    const entry = { ...job, appStatus: { stage: "not_applied", dateApplied: "", contact: "", contactRole: "", companyResponse: "", nextAction: "", nextActionDate: "", notes: "", lastUpdated: new Date().toISOString() }, trackedAt: new Date().toISOString() };
    const updated = [entry, ...trackerJobs];
    updateTrackerJobs(updated); showToast("Moved to Tracker!");
  }

  function removeFromTracker(job) {
    const updated = trackerJobs.filter(t => !(t.savedAt === job.savedAt && t.jobTitle === job.jobTitle && t.company === job.company));
    updateTrackerJobs(updated); showToast("Removed from tracker.");
  }

  function saveTrackerUpdate(appStatus) {
    const updated = trackerJobs.map(j => j.savedAt === modalJob.savedAt ? { ...j, appStatus } : j);
    updateTrackerJobs(updated); setModalJob(null); showToast("Progress saved!");
  }

  const stageCounts = STAGES.reduce((acc, s) => { acc[s.key] = trackerJobs.filter(j => j.appStatus && j.appStatus.stage === s.key).length; return acc; }, {});
  const filteredTracker = trackerStage === "all" ? trackerJobs : trackerJobs.filter(j => j.appStatus && j.appStatus.stage === trackerStage);

  const tabSt = t => ({ padding: "7px 14px", borderRadius: 7, border: tab === t ? "1px solid #252a38" : "1px solid transparent", background: tab === t ? "#1a1e28" : "transparent", color: tab === t ? "#e8eaf0" : "#5a6070", fontFamily: "inherit", fontSize: "0.78rem", cursor: "pointer" });

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div style={S.logo}><div style={S.logoDot} />Career Command Center</div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {isMentor && (
            <span style={{ background: "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.4)", color: "#a78bfa", fontSize: "0.68rem", fontFamily: "'DM Mono',monospace", padding: "4px 11px", borderRadius: 8 }}>
              👁 Mentor View — Read Only
            </span>
          )}
          {!isMentor && !migrated && (
            <button onClick={migrateToSupabase} disabled={syncing} style={{ background: "rgba(0,229,160,0.1)", border: "1px solid rgba(0,229,160,0.4)", color: "#00e5a0", fontSize: "0.68rem", padding: "5px 11px", borderRadius: 7, cursor: "pointer", fontFamily: "inherit", opacity: syncing ? 0.5 : 1 }}>
              {syncing ? "Migrating..." : "⬆ Migrate Local Data to Cloud"}
            </button>
          )}
          <div style={{ fontFamily: "'DM Mono',monospace", fontSize: "0.62rem", color: syncing ? "#f59e0b" : syncStatus === "Synced" ? "#00e5a0" : "#5a6070", display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: syncing ? "#f59e0b" : syncStatus === "Synced" ? "#00e5a0" : "#5a6070" }} />
            {syncing ? "Syncing..." : syncStatus || "Connecting..."}
          </div>
          <div style={{ fontFamily: "'DM Mono',monospace", fontSize: "0.65rem", color: "#5a6070" }}>Kevin Doan · SF Bay Area · $65k–$100k</div>
        </div>
      </div>

      <div style={S.layout}>
        <div style={S.sidebar}>
          <div style={{ ...S.panel, padding: 13 }}>
            <div style={{ fontWeight: 700, fontSize: "0.9rem", marginBottom: 3 }}>Kevin Doan</div>
            <div style={{ fontSize: "0.68rem", color: "#00e5a0", fontFamily: "'DM Mono',monospace", marginBottom: 9 }}>// Tech & Ops Job Seeker</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {["SDR/BDR", "Customer Success", "Operations", "Logistics"].map(t => <span key={t} style={S.hiTag}>{t}</span>)}

            </div>
          </div>

          <div>
            <div style={S.label}>Pipeline Stats</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
              <div style={S.statCard}><div style={{ fontWeight: 700, fontSize: "1.1rem", color: "#00e5a0" }}>{savedJobs.length}</div><div style={{ fontSize: "0.6rem", color: "#5a6070", marginTop: 2 }}>Saved</div></div>
              <div style={S.statCard}><div style={{ fontWeight: 700, fontSize: "1.1rem", color: "#a78bfa" }}>{trackerJobs.length}</div><div style={{ fontSize: "0.6rem", color: "#5a6070", marginTop: 2 }}>Tracking</div></div>
              <div style={S.statCard}><div style={{ fontWeight: 700, fontSize: "1.1rem", color: "#f59e0b" }}>{stageCounts["interview1"] + stageCounts["interview2"] + stageCounts["final"]}</div><div style={{ fontSize: "0.6rem", color: "#5a6070", marginTop: 2 }}>Interviews</div></div>
              <div style={S.statCard}><div style={{ fontWeight: 700, fontSize: "1.1rem", color: "#00e5a0" }}>{stageCounts["offer"]}</div><div style={{ fontSize: "0.6rem", color: "#5a6070", marginTop: 2 }}>Offers</div></div>
            </div>
          </div>

          <div>
            <div style={S.label}>Tier System</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>

                { t: 1, lbl: "Prime Target", sub: "Pre-seed to Series C · tech/SaaS · remote/hybrid · $65k-$100k" },
                { t: 2, lbl: "Stretch",      sub: "Series D+ · enterprise · outside commute · credential gaps" },
                { t: 3, lbl: "Volume Play",  sub: "Hard degree req · commission-only · clearly out of range" },

                const col = tierColor(t);
                return (
                  <div key={t} style={{ display: "flex", gap: 8, padding: "8px 10px", borderRadius: 7, border: `1px solid ${col}33`, background: "#12151c" }}>
                    <div style={{ width: 22, height: 22, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: "0.67rem", background: `${col}22`, color: col, flexShrink: 0 }}>T{t}</div>
                    <div>
                      <div style={{ fontSize: "0.76rem", fontWeight: 500, color: col }}>{lbl}</div>
                      <div style={{ fontSize: "0.6rem", color: "#5a6070", marginTop: 1, lineHeight: 1.4 }}>{sub}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ background: "rgba(61,139,255,0.07)", border: "1px solid rgba(61,139,255,0.2)", borderRadius: 8, padding: 11, fontSize: "0.7rem", color: "#3d8bff", display: "flex", gap: 7 }}>
            <span>🔗</span><span>Share with your mentor — they can see your full pipeline and action plans.</span>
          </div>
        </div>

        <div style={S.content}>
          <div style={S.tabs}>
            {!isMentor && <button style={tabSt("search")}  onClick={() => setTab("search")}>🔍 Search ({searchResults.length})</button>}
            {!isMentor && <button style={tabSt("analyze")} onClick={() => setTab("analyze")}>⬡ Analyze</button>}
            <button style={tabSt("saved")}   onClick={() => setTab("saved")}>📋 Saved ({savedJobs.length})</button>
            <button style={tabSt("tracker")} onClick={() => setTab("tracker")}>🎯 Tracker ({trackerJobs.length})</button>
          </div>

          {tab === "search" && (
            <div>
              <div style={S.panel}>
                <div style={S.panelHdr}><div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Search All My Roles</div><div style={{ fontSize: "0.68rem", color: "#5a6070", marginTop: 2 }}>Batched search · {ALL_ROLES.length} role types · weighted priority · SF Bay Area{includeRemote ? " + Remote" : ""} · ~45–60 seconds</div></div>
                <div style={S.panelBody}>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                    <select value={salary} onChange={e => setSalary(e.target.value)} style={S.select}>
                      <option value="">Any Salary</option>
                      <option value="60000">$60k+</option>
                      <option value="70000">$70k+</option>
                      <option value="80000">$80k+</option>
                      <option value="90000">$90k+</option>
                    </select>
                    <select value={days} onChange={e => setDays(e.target.value)} style={S.select}>
                      <option value="3">Last 3 days</option>
                      <option value="7">Last 7 days</option>
                      <option value="14">Last 2 weeks</option>
                      <option value="30">Last 30 days</option>
                    </select>
                    <button style={{ ...S.btn, opacity: searching ? 0.6 : 1 }} disabled={searching} onClick={runSearch}>
                      {searching ? <><Spinner /> Searching...</> : "🔍 Search All My Roles"}
                    </button>
                  </div>
                  <label style={{ display: "flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: "0.78rem", userSelect: "none" }}>
                    <input type="checkbox" checked={includeRemote} onChange={e => setRemote(e.target.checked)} style={{ accentColor: "#00e5a0" }} />
                    Include remote-friendly roles (nationwide)
                  </label>
                </div>
              </div>

              {searchError && <div style={{ background: "rgba(255,107,74,0.1)", border: "1px solid rgba(255,107,74,0.3)", borderRadius: 8, padding: "12px 16px", fontSize: "0.78rem", color: "#ff6b4a" }}>{searchError}</div>}

              {searchResults.length > 0 && (
                <>
                  <div style={{ ...S.panel, padding: "14px 16px" }}>
                    <div style={S.label}>Filter by Role Type</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                      <button onClick={() => toggleRole("__all__")} style={{ padding: "5px 12px", borderRadius: 16, border: `1px solid ${activeRoles.size === 0 ? "#e8eaf0" : "#252a38"}`, background: activeRoles.size === 0 ? "rgba(255,255,255,0.05)" : "transparent", color: activeRoles.size === 0 ? "#e8eaf0" : "#5a6070", fontSize: "0.7rem", fontFamily: "'DM Mono',monospace", cursor: "pointer" }}>
                        All ({searchResults.length})
                      </button>
                      {ALL_ROLES.filter(r => searchResults.some(j => j._roleLabel === r.label)).map(r => {
                        const cnt = searchResults.filter(j => j._roleLabel === r.label).length;
                        const active = activeRoles.has(r.label);
                        return <button key={r.label} onClick={() => toggleRole(r.label)} style={{ padding: "5px 12px", borderRadius: 16, border: `1px solid ${active ? "#00e5a0" : "#252a38"}`, background: active ? "rgba(0,229,160,0.08)" : "transparent", color: active ? "#00e5a0" : "#5a6070", fontSize: "0.7rem", fontFamily: "'DM Mono',monospace", cursor: "pointer" }}>{r.label} ({cnt})</button>;
                      })}
                    </div>
                    <div style={{ borderTop: "1px solid #252a38", paddingTop: 12, display: "flex", flexWrap: "wrap", gap: 7, alignItems: "center" }}>
                      <div style={{ ...S.label, margin: 0 }}>Salary Filter:</div>
                      {[["any", "Any (inc. unlisted)"], ["realistic", "Realistic $50k-$110k"], ["hide-unlisted", "Realistic + hide unlisted"]].map(([v, lbl]) => (
                        <button key={v} onClick={() => setSalaryFilter(v)} style={{ padding: "5px 11px", borderRadius: 14, border: `1px solid ${salaryFilter === v ? "#ff6b4a" : "#252a38"}`, background: salaryFilter === v ? "rgba(255,107,74,0.08)" : "transparent", color: salaryFilter === v ? "#ff6b4a" : "#5a6070", fontSize: "0.68rem", fontFamily: "'DM Mono',monospace", cursor: "pointer" }}>{lbl}</button>
                      ))}
                        <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: "0.68rem", color: "#5a6070", marginLeft: "auto", userSelect: "none" }}>
                        <input type="checkbox" checked={hideViewed} onChange={e => setHideViewed(e.target.checked)} style={{ accentColor: "#00e5a0" }} />
                        Hide actioned ({viewedIds.size})
                      </label>
                    </div>
                  </div>

                  <div style={{ fontSize: "0.68rem", color: "#5a6070", fontFamily: "'DM Mono',monospace", marginBottom: 8 }}>
                    {filteredResults.length} listing{filteredResults.length !== 1 ? "s" : ""} · {activeRoles.size === 0 ? "all roles" : `${activeRoles.size} role type${activeRoles.size > 1 ? "s" : ""}`}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                    {filteredResults.map((j, i) => {
                      const sal = j.salary_min && j.salary_max ? `$${Math.round(j.salary_min/1000)}k-$${Math.round(j.salary_max/1000)}k` : j.salary_min ? `$${Math.round(j.salary_min/1000)}k+` : null;
                      const viewed = viewedIds.has(String(j.id));
                      const desc = (j.description || "").replace(/<[^>]+>/g, " ").substring(0, 220);
                      const copyText = `Job Title: ${j.title}\nCompany: ${(j.company && j.company.display_name) || "Unknown"}\nLocation: ${(j.location && j.location.display_name) || "SF Bay Area"}\nSalary: ${sal || "Not listed"}\nPosted: ${new Date(j.created).toLocaleDateString()}\nJob URL: ${j.redirect_url}\n\nJob Description:\n${(j.description || "").replace(/<[^>]+>/g, " ")}`;
                      return (
                        <div key={i} style={{ background: "#12151c", border: "1px solid #252a38", borderRadius: 9, padding: "13px 15px" }}>
                          <div style={{ fontWeight: 600, fontSize: "0.87rem", display: "flex", flexWrap: "wrap", alignItems: "center", gap: 6, marginBottom: 6 }}>
                            {j.title}
                            <span style={{ background: "rgba(61,139,255,0.1)", color: "#3d8bff", fontSize: "0.6rem", fontFamily: "'DM Mono',monospace", padding: "2px 7px", borderRadius: 9, border: "1px solid rgba(61,139,255,0.25)" }}>{j._roleLabel}</span>
                            {j._remote && <span style={{ background: "rgba(167,139,250,0.1)", color: "#a78bfa", fontSize: "0.6rem", fontFamily: "'DM Mono',monospace", padding: "2px 7px", borderRadius: 9, border: "1px solid rgba(167,139,250,0.3)" }}>REMOTE</span>}
                            {viewed && <span style={{ background: "#1a1e28", color: "#5a6070", fontSize: "0.6rem", fontFamily: "'DM Mono',monospace", padding: "2px 7px", borderRadius: 9, border: "1px solid #252a38" }}>Actioned</span>}
                          </div>
                          <div style={{ fontSize: "0.7rem", color: "#5a6070", display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 7 }}>
                            <span>{j.company && j.company.display_name}</span>
                            <span>{j.location && j.location.display_name}</span>
                            {sal && <span style={{ color: "#3d8bff", fontFamily: "'DM Mono',monospace" }}>{sal}</span>}
                            <span>{new Date(j.created).toLocaleDateString()}</span>
                          </div>
                          <div style={{ fontSize: "0.72rem", color: "#5a6070", marginBottom: 10, lineHeight: 1.5 }}>{desc}...</div>
                          <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                            <button onClick={() => { navigator.clipboard.writeText(copyText); showToast("Copied!"); }} style={{ background: "#3d8bff", color: "white", border: "none", padding: "6px 12px", borderRadius: 6, fontSize: "0.7rem", cursor: "pointer", fontWeight: 600, fontFamily: "inherit" }}>Copy for Analyze</button>
                            <button onClick={() => { markViewed(j.id); setJobText(copyText); setJobUrl(""); setResult(null); setResultSaved(false); setAnalyzeError(""); setTab("analyze"); showToast("Loaded in Analyze tab."); }} style={S.btnSm}>Send to Analyze</button>
                            <button onClick={() => { markViewed(j.id); setJobUrl(j.redirect_url); setJobText(""); setResult(null); setResultSaved(false); setAnalyzeError(""); setTab("analyze"); showToast("URL loaded — click Fetch in Analyze tab."); }} style={{ ...S.btnSm, borderColor: "rgba(167,139,250,0.4)", color: "#a78bfa" }}>Auto-Fetch & Analyze</button>
                            <a href={j.redirect_url} target="_blank" rel="noreferrer" onClick={() => markViewed(j.id)} style={{ background: "transparent", border: "1px solid #252a38", color: "#e8eaf0", padding: "5px 11px", borderRadius: 5, fontSize: "0.7rem", textDecoration: "none" }}>View Listing</a>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {!searching && searchResults.length === 0 && !searchError && (
                <div style={{ textAlign: "center", padding: 50, color: "#5a6070" }}>
                  <div style={{ fontSize: "2rem", marginBottom: 12, opacity: 0.3 }}>🔍</div>
                  <div style={{ fontWeight: 600, color: "#e8eaf0", marginBottom: 5 }}>Ready to search</div>
                  <div style={{ fontSize: "0.78rem" }}>Hit Search All My Roles to load your feed.</div>
                </div>
              )}
            </div>
          )}

          {tab === "analyze" && (
            <div>
              <div style={S.panel}>
                <div style={S.panelHdr}><div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Analyze a Job Listing</div><div style={{ fontSize: "0.68rem", color: "#5a6070", marginTop: 2 }}>Paste a URL to auto-fetch · or paste job text directly · Claude scores fit against your profile</div></div>
                <div style={S.panelBody}>
                  <div style={{ marginBottom: 14 }}>
                    <div style={S.label}>Option 1 — Fetch from URL (auto-grabs job description)</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <input type="text" placeholder="Paste job listing URL here" value={jobUrl} onChange={e => setJobUrl(e.target.value)} style={{ ...S.input, flex: 1 }} />
                      <button style={{ ...S.btn, opacity: fetchingUrl ? 0.6 : 1 }} disabled={fetchingUrl} onClick={fetchJobUrl}>
                        {fetchingUrl ? <><Spinner /> Fetching...</> : "Fetch"}
                      </button>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, color: "#5a6070", fontSize: "0.72rem" }}>
                    <div style={{ flex: 1, height: 1, background: "#252a38" }} />or paste text directly<div style={{ flex: 1, height: 1, background: "#252a38" }} />
                  </div>
                  <div style={S.label}>Option 2 — Paste job description text</div>
                  <textarea style={S.textarea} placeholder="Paste the full job description here..." value={jobText} onChange={e => { setJobText(e.target.value); setResult(null); setResultSaved(false); setAnalyzeError(""); }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 11, alignItems: "center" }}>
                    <button style={{ ...S.btn, opacity: analyzing ? 0.6 : 1 }} disabled={analyzing} onClick={() => doAnalyze(jobText)}>
                      {analyzing ? <><Spinner /> Analyzing...</> : "Analyze This Job"}
                    </button>
                    {!analyzing && <span style={{ fontSize: "0.68rem", color: "#5a6070" }}>~10 seconds</span>}
                  </div>
                  {analyzeError && <div style={{ marginTop: 11, padding: "10px 13px", background: "rgba(255,107,74,0.1)", border: "1px solid rgba(255,107,74,0.3)", borderRadius: 7, fontSize: "0.76rem", color: "#ff6b4a" }}>{analyzeError}</div>}
                </div>
              </div>
              {result && <ResultCard result={result} raw={jobText} onSave={saveResult} saved={resultSaved} />}
            </div>
          )}

          {tab === "saved" && (
            <div>
              <div style={{ display: "flex", gap: 7, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
                <div style={{ display: "flex", gap: 3, background: "#12151c", border: "1px solid #252a38", borderRadius: 7, padding: 3 }}>
                  {[["new", "New"], ["all", "All"]].map(([v, lbl]) => (
                    <button key={v} onClick={() => setSavedFilter(v)} style={{ padding: "5px 11px", borderRadius: 5, border: savedFilter === v ? "1px solid #252a38" : "1px solid transparent", background: savedFilter === v ? "#1a1e28" : "transparent", color: savedFilter === v ? "#00e5a0" : "#5a6070", fontSize: "0.7rem", fontFamily: "'DM Mono',monospace", cursor: "pointer" }}>{lbl}</button>
                  ))}
                </div>
                <select value={jobFilter} onChange={e => setJobFilter(e.target.value === "all" ? "all" : parseInt(e.target.value))} style={{ ...S.select, width: "auto" }}>
                  <option value="all">All Tiers ({savedJobs.length})</option>
                  <option value="1">Tier 1 ({counts.t1})</option>
                  <option value="2">Tier 2 ({counts.t2})</option>
                  <option value="3">Tier 3 ({counts.t3})</option>
                </select>
                <select value={sortDate} onChange={e => { setSortDate(e.target.value); setSortTier("none"); }} style={{ ...S.select, width: "auto" }}>
                  <option value="newest">Newest First</option>
                  <option value="oldest">Oldest First</option>
                </select>
                <select value={sortTier} onChange={e => setSortTier(e.target.value)} style={{ ...S.select, width: "auto" }}>
                  <option value="none">Tier Sort: Off</option>
                  <option value="asc">Tier 1 to 3</option>
                  <option value="desc">Tier 3 to 1</option>
                </select>
                <div style={{ flex: 1 }} />
                {!isMentor && <button style={{ ...S.btn2, fontSize: "0.7rem", padding: "5px 10px" }} onClick={() => { updateSavedJobs([]); showToast("All saved jobs cleared."); }}>Clear All</button>}
              </div>

              {filteredJobs.length === 0 ? (
                <div style={{ textAlign: "center", padding: 50, color: "#5a6070" }}>
                  <div style={{ fontSize: "1.8rem", marginBottom: 12, opacity: 0.3 }}>◈</div>
                  <div style={{ fontWeight: 600, color: "#e8eaf0", marginBottom: 5 }}>{savedFilter === "new" ? "No new jobs to triage" : "No saved jobs yet"}</div>
                  <div style={{ fontSize: "0.76rem" }}>{savedFilter === "new" ? "All jobs moved to Tracker." : "Analyze jobs to build your pipeline."}</div>
                </div>
              ) : filteredJobs.map((j, i) => {
                const col = tierColor(j.tier);
                const inTracker = trackerJobs.find(t => t.savedAt === j.savedAt);
                return (
                  <div key={i} style={{ background: "#12151c", border: "1px solid #252a38", borderRadius: 10, padding: 13, marginBottom: 8 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 11, alignItems: "center" }}>
                      <div style={{ width: 3, height: 50, borderRadius: 2, background: col, boxShadow: `0 0 6px ${col}` }} />
                      <div style={{ cursor: "pointer" }} onClick={() => { setJobText(j.rawText || ""); setResult(j); setResultSaved(true); setTab("analyze"); }}>
                        <div style={{ fontWeight: 600, fontSize: "0.87rem" }}>{j.jobTitle}</div>
                        <div style={{ fontSize: "0.7rem", color: "#5a6070", marginTop: 3, display: "flex", gap: 9, flexWrap: "wrap", alignItems: "center" }}>
                          <span>{j.company}</span>
                          <span style={{ color: col }}>Tier {j.tier}</span>
                          <span>{j.salaryFit}</span>
                          {j.listingUrl && <a href={j.listingUrl} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()} style={{ color: "#3d8bff", fontSize: "0.65rem", fontFamily: "'DM Mono',monospace", textDecoration: "none", border: "1px solid rgba(61,139,255,0.3)", padding: "1px 7px", borderRadius: 8, background: "rgba(61,139,255,0.08)" }}>View</a>}
                        </div>
                        <div style={{ marginTop: 4, fontSize: "0.63rem", fontFamily: "'DM Mono',monospace", color: "#a78bfa" }}>
                          Logged {new Date(j.savedAt).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} at {new Date(j.savedAt).toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })}
                        </div>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5 }}>
                        <div style={{ fontWeight: 700, fontSize: "1rem", color: col }}>{j.matchScore}%</div>
                        {inTracker
                          ? <span style={{ fontSize: "0.62rem", color: "#a78bfa", fontFamily: "'DM Mono',monospace", background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.25)", padding: "2px 8px", borderRadius: 8 }}>In Tracker</span>
                          : !isMentor && <button onClick={() => moveToTracker(j)} style={S.btnSm}>+ Move to Tracker</button>}
                      </div>
                    </div>
                    {!isMentor && <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #1a1e28", display: "flex", justifyContent: "flex-end" }}>
                      <button type="button" onClick={() => removeSavedJob(j)} style={S.btnRed}>Remove this job</button>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}

          {tab === "tracker" && (
            <div>
              <div style={{ display: "flex", gap: 6, marginBottom: 13, flexWrap: "wrap" }}>
                {STAGES.filter(s => s.key !== "not_applied" && stageCounts[s.key] > 0).map(s => (
                  <div key={s.key} style={{ background: s.bg, border: `1px solid ${s.color}44`, borderRadius: 8, padding: "6px 11px", display: "flex", gap: 5, alignItems: "center" }}>
                    <span style={{ fontWeight: 700, fontSize: "0.95rem", color: s.color }}>{stageCounts[s.key]}</span>
                    <span style={{ fontSize: "0.67rem", color: s.color }}>{s.label}</span>
                  </div>
                ))}
                {trackerJobs.length === 0 && <div style={{ fontSize: "0.78rem", color: "#5a6070" }}>No applications tracked yet.</div>}
              </div>

              {trackerJobs.length > 0 && (
                <>
                  <div style={{ ...S.panel, padding: "13px 16px", marginBottom: 13 }}>
                    <div style={S.label}>Pipeline Funnel</div>
                    {[
                      { lbl: "Tracked", count: trackerJobs.length, color: "#5a6070" },
                      { lbl: "Applied+", count: ["applied","phone","interview1","interview2","final","offer"].reduce((a,k) => a + stageCounts[k], 0), color: "#3d8bff" },
                      { lbl: "Phone Screen+", count: ["phone","interview1","interview2","final","offer"].reduce((a,k) => a + stageCounts[k], 0), color: "#a78bfa" },
                      { lbl: "Interview+", count: ["interview1","interview2","final","offer"].reduce((a,k) => a + stageCounts[k], 0), color: "#f59e0b" },
                      { lbl: "Offer", count: stageCounts["offer"], color: "#00e5a0" },
                    ].map(row => {
                      const pct = trackerJobs.length > 0 ? Math.round((row.count / trackerJobs.length) * 100) : 0;
                      return (
                        <div key={row.lbl} style={{ display: "grid", gridTemplateColumns: "110px 1fr 36px", gap: 7, alignItems: "center", marginBottom: 5 }}>
                          <div style={{ fontSize: "0.66rem", color: "#5a6070", fontFamily: "'DM Mono',monospace" }}>{row.lbl}</div>
                          <div style={{ height: 5, background: "#1a1e28", borderRadius: 3, overflow: "hidden" }}>
                            <div style={{ height: "100%", width: `${pct}%`, background: row.color, borderRadius: 3 }} />
                          </div>
                          <div style={{ fontSize: "0.66rem", color: row.color, fontFamily: "'DM Mono',monospace", textAlign: "right" }}>{row.count}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{ marginBottom: 11 }}>
                    <select value={trackerStage} onChange={e => setTrackerStage(e.target.value)} style={{ ...S.select, width: "auto" }}>
                      <option value="all">All Stages ({trackerJobs.length})</option>
                      {STAGES.map(s => <option key={s.key} value={s.key}>{s.label} ({stageCounts[s.key]})</option>)}
                    </select>
                  </div>

                  <div style={{ ...S.panel, overflow: "hidden" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 70px 120px 100px 110px auto", gap: 0, padding: "9px 13px", borderBottom: "1px solid #252a38", background: "#0a0c10" }}>
                      {["Role", "Company", "Tier", "Status", "Applied", "Next Action", ""].map((h, i) => (
                        <div key={i} style={{ fontSize: "0.58rem", color: "#5a6070", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.08em" }}>{h}</div>
                      ))}
                    </div>
                    {filteredTracker.length === 0
                      ? <div style={{ padding: 24, textAlign: "center", color: "#5a6070", fontSize: "0.76rem" }}>No applications match this stage.</div>
                      : filteredTracker.map((j, i) => {
                          const st = stageByKey((j.appStatus && j.appStatus.stage) || "not_applied");
                          const col = tierColor(j.tier);
                          const overdue = j.appStatus && j.appStatus.nextActionDate && new Date(j.appStatus.nextActionDate) < new Date();
                          return (
                            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 70px 120px 100px 110px auto", gap: 0, padding: "10px 13px", borderBottom: i < filteredTracker.length - 1 ? "1px solid #1a1e28" : "none", alignItems: "center" }}>
                              <div>
                                <div style={{ fontSize: "0.8rem", fontWeight: 500 }}>{j.jobTitle}</div>
                                {j.listingUrl && <a href={j.listingUrl} target="_blank" rel="noreferrer" style={{ fontSize: "0.6rem", color: "#3d8bff", textDecoration: "none", fontFamily: "'DM Mono',monospace" }}>View</a>}
                              </div>
                              <div style={{ fontSize: "0.76rem", color: "#5a6070" }}>
                                {j.company}
                                {j.appStatus && j.appStatus.contact && <div style={{ fontSize: "0.63rem", marginTop: 1 }}>{j.appStatus.contact}</div>}
                              </div>
                              <div><span style={{ background: `${col}22`, color: col, border: `1px solid ${col}44`, padding: "2px 7px", borderRadius: 5, fontSize: "0.6rem", fontFamily: "'DM Mono',monospace" }}>T{j.tier}</span></div>
                              <div><span style={{ background: st.bg, color: st.color, border: `1px solid ${st.color}44`, padding: "3px 8px", borderRadius: 6, fontSize: "0.65rem", fontFamily: "'DM Mono',monospace", whiteSpace: "nowrap" }}>{st.label}</span></div>
                              <div style={{ fontSize: "0.7rem", color: "#5a6070", fontFamily: "'DM Mono',monospace" }}>{(j.appStatus && j.appStatus.dateApplied) || "—"}</div>
                              <div style={{ fontSize: "0.68rem", color: overdue ? "#ff6b4a" : "#5a6070", fontFamily: "'DM Mono',monospace" }}>
                                {j.appStatus && j.appStatus.nextActionDate ? <>{overdue && "! "}{j.appStatus.nextActionDate}{j.appStatus.nextAction && <div style={{ fontSize: "0.6rem", marginTop: 1, color: "#5a6070" }}>{j.appStatus.nextAction}</div>}</> : "—"}
                              </div>
                              <div style={{ display: "flex", gap: 4 }}>
                                {!isMentor && <button type="button" onClick={() => setModalJob(j)} style={{ ...S.btn2, fontSize: "0.65rem", padding: "3px 8px" }}>Edit</button>}
                                {!isMentor && <button type="button" onClick={() => removeFromTracker(j)} style={{ background: "rgba(255,107,74,0.1)", border: "1px solid rgba(255,107,74,0.3)", color: "#ff6b4a", fontSize: "0.65rem", padding: "3px 8px", borderRadius: 5, cursor: "pointer", fontFamily: "inherit" }}>Remove</button>}
                              </div>
                            </div>
                          );
                        })}
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {modalJob && <TrackerModal job={modalJob} onSave={saveTrackerUpdate} onClose={() => setModalJob(null)} />}
      <Toast msg={toast} />
    </div>
  );
}

document.getElementById("root").innerHTML = "";
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
